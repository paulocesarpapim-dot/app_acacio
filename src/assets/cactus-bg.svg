<svg viewBox="0 0 1200 600" xmlns="http://www.w3.org/2000/svg">
  <rect width="1200" height="600" fill="white"/>

  <!-- SOL COM ESPIRAL - preenchido preto com raios pontiagudos -->
  <g transform="translate(115,95)">
    <circle cx="0" cy="0" r="42" fill="black"/>
    <!-- Espiral branca dentro do sol -->
    <path d="M0,0 C4,0 4,-4 0,-4 C-7,-4 -7,7 0,7 C11,7 11,-11 0,-11 C-15,-11 -15,15 0,15 C19,15 19,-19 0,-19 C-23,-19 -23,23 0,23 C27,23 27,-27 0,-27 C-31,-27 -31,31 1,-31" fill="none" stroke="white" stroke-width="3" stroke-linecap="round"/>
    <!-- Raios triangulares do sol -->
    <polygon points="0,-48 -8,-70 8,-70" fill="black"/>
    <polygon points="0,48 -8,70 8,70" fill="black"/>
    <polygon points="-48,0 -70,-8 -70,8" fill="black"/>
    <polygon points="48,0 70,-8 70,8" fill="black"/>
    <polygon points="-34,-34 -55,-42 -42,-55" fill="black"/>
    <polygon points="34,-34 55,-42 42,-55" fill="black"/>
    <polygon points="-34,34 -55,42 -42,55" fill="black"/>
    <polygon points="34,34 55,42 42,55" fill="black"/>
    <polygon points="-18,-45 -32,-62 -12,-65" fill="black"/>
    <polygon points="18,-45 32,-62 12,-65" fill="black"/>
    <polygon points="-45,-18 -62,-32 -65,-12" fill="black"/>
    <polygon points="45,-18 62,-32 65,-12" fill="black"/>
    <polygon points="-18,45 -32,62 -12,65" fill="black"/>
    <polygon points="18,45 32,62 12,65" fill="black"/>
    <polygon points="-45,18 -62,32 -65,12" fill="black"/>
    <polygon points="45,18 62,32 65,12" fill="black"/>
  </g>

  <!-- NUVEM 1 - escura (topo centro-esquerda) -->
  <g transform="translate(330,55)">
    <ellipse cx="0" cy="0" rx="38" ry="22" fill="black"/>
    <ellipse cx="28" cy="-4" rx="30" ry="18" fill="black"/>
    <ellipse cx="-22" cy="4" rx="26" ry="16" fill="black"/>
  </g>

  <!-- NUVEM 2 - branca com contorno (centro) -->
  <g transform="translate(490,85)">
    <ellipse cx="-15" cy="8" rx="32" ry="16" fill="white" stroke="black" stroke-width="2.5"/>
    <ellipse cx="20" cy="6" rx="30" ry="16" fill="white" stroke="black" stroke-width="2.5"/>
    <ellipse cx="0" cy="-4" rx="28" ry="18" fill="white" stroke="black" stroke-width="2.5"/>
    <ellipse cx="0" cy="6" rx="35" ry="14" fill="white"/>
  </g>

  <!-- NUVEM 3 - branca pequena (centro-inferior) -->
  <g transform="translate(530,130)">
    <ellipse cx="0" cy="0" rx="22" ry="12" fill="white" stroke="black" stroke-width="2"/>
    <ellipse cx="16" cy="-2" rx="18" ry="10" fill="white" stroke="black" stroke-width="2"/>
    <ellipse cx="8" cy="2" rx="20" ry="10" fill="white"/>
  </g>

  <!-- NUVEM 4 - branca com contorno (entre cactos, direita) -->
  <g transform="translate(820,105)">
    <ellipse cx="-12" cy="6" rx="30" ry="15" fill="white" stroke="black" stroke-width="2.5"/>
    <ellipse cx="18" cy="4" rx="28" ry="15" fill="white" stroke="black" stroke-width="2.5"/>
    <ellipse cx="2" cy="-5" rx="26" ry="16" fill="white" stroke="black" stroke-width="2.5"/>
    <ellipse cx="3" cy="5" rx="32" ry="13" fill="white"/>
  </g>

  <!-- NUVEM 5 - escura (direita superior) -->
  <g transform="translate(1000,50)">
    <ellipse cx="0" cy="0" rx="32" ry="18" fill="black"/>
    <ellipse cx="24" cy="-3" rx="26" ry="15" fill="black"/>
    <ellipse cx="-18" cy="4" rx="22" ry="13" fill="black"/>
  </g>

  <!-- CACTO ESQUERDO (menor) -->
  <g transform="translate(340,160)">
    <!-- Tronco principal arredondado -->
    <rect x="-22" y="0" width="44" height="340" rx="22" fill="black"/>
    <!-- Braço esquerdo curvado para cima -->
    <path d="M-22,140 C-65,140 -65,140 -65,90 C-65,50 -40,50 -40,50" fill="black" stroke="black" stroke-width="1"/>
    <rect x="-65" y="50" width="25" height="95" rx="12" fill="black"/>
    <rect x="-45" y="130" width="25" height="20" rx="8" fill="black"/>
    <!-- Braço direito curvado para cima -->
    <path d="M22,180 C60,180 60,180 60,130 C60,95 40,95 40,95" fill="black" stroke="black" stroke-width="1"/>
    <rect x="40" y="95" width="22" height="90" rx="11" fill="black"/>
    <rect x="20" y="170" width="22" height="20" rx="8" fill="black"/>
    <!-- Espinhos/traços brancos no tronco -->
    <line x1="-10" y1="25" x2="10" y2="25" stroke="white" stroke-width="1.5" opacity="0.6"/>
    <line x1="-10" y1="55" x2="10" y2="55" stroke="white" stroke-width="1.5" opacity="0.6"/>
    <line x1="-10" y1="85" x2="10" y2="85" stroke="white" stroke-width="1.5" opacity="0.6"/>
    <line x1="-10" y1="115" x2="10" y2="115" stroke="white" stroke-width="1.5" opacity="0.6"/>
    <line x1="-10" y1="145" x2="10" y2="145" stroke="white" stroke-width="1.5" opacity="0.6"/>
    <line x1="-10" y1="175" x2="10" y2="175" stroke="white" stroke-width="1.5" opacity="0.6"/>
    <line x1="-10" y1="205" x2="10" y2="205" stroke="white" stroke-width="1.5" opacity="0.6"/>
    <line x1="-10" y1="235" x2="10" y2="235" stroke="white" stroke-width="1.5" opacity="0.6"/>
    <line x1="-10" y1="265" x2="10" y2="265" stroke="white" stroke-width="1.5" opacity="0.6"/>
    <line x1="-10" y1="295" x2="10" y2="295" stroke="white" stroke-width="1.5" opacity="0.6"/>
    <line x1="-10" y1="325" x2="10" y2="325" stroke="white" stroke-width="1.5" opacity="0.6"/>
  </g>

  <!-- CACTO DIREITO (maior) -->
  <g transform="translate(860,100)">
    <!-- Tronco principal grande arredondado -->
    <rect x="-28" y="0" width="56" height="400" rx="28" fill="black"/>
    <!-- Braço esquerdo curvado para cima -->
    <path d="M-28,165 C-78,165 -78,165 -78,110 C-78,60 -50,60 -50,60" fill="black" stroke="black" stroke-width="1"/>
    <rect x="-78" y="60" width="30" height="110" rx="15" fill="black"/>
    <rect x="-52" y="155" width="26" height="22" rx="10" fill="black"/>
    <!-- Braço direito superior curvado para cima -->
    <path d="M28,100 C75,100 75,100 75,50 C75,10 52,10 52,10" fill="black" stroke="black" stroke-width="1"/>
    <rect x="48" y="10" width="28" height="95" rx="14" fill="black"/>
    <rect x="26" y="90" width="24" height="22" rx="10" fill="black"/>
    <!-- Braço direito inferior -->
    <path d="M28,260 C68,260 68,260 68,220 C68,190 48,190 48,190" fill="black" stroke="black" stroke-width="1"/>
    <rect x="45" y="190" width="24" height="75" rx="12" fill="black"/>
    <rect x="26" y="250" width="22" height="20" rx="8" fill="black"/>
    <!-- Espinhos/traços brancos no tronco -->
    <line x1="-14" y1="30" x2="14" y2="30" stroke="white" stroke-width="1.8" opacity="0.6"/>
    <line x1="-14" y1="65" x2="14" y2="65" stroke="white" stroke-width="1.8" opacity="0.6"/>
    <line x1="-14" y1="100" x2="14" y2="100" stroke="white" stroke-width="1.8" opacity="0.6"/>
    <line x1="-14" y1="135" x2="14" y2="135" stroke="white" stroke-width="1.8" opacity="0.6"/>
    <line x1="-14" y1="170" x2="14" y2="170" stroke="white" stroke-width="1.8" opacity="0.6"/>
    <line x1="-14" y1="205" x2="14" y2="205" stroke="white" stroke-width="1.8" opacity="0.6"/>
    <line x1="-14" y1="240" x2="14" y2="240" stroke="white" stroke-width="1.8" opacity="0.6"/>
    <line x1="-14" y1="275" x2="14" y2="275" stroke="white" stroke-width="1.8" opacity="0.6"/>
    <line x1="-14" y1="310" x2="14" y2="310" stroke="white" stroke-width="1.8" opacity="0.6"/>
    <line x1="-14" y1="345" x2="14" y2="345" stroke="white" stroke-width="1.8" opacity="0.6"/>
    <line x1="-14" y1="380" x2="14" y2="380" stroke="white" stroke-width="1.8" opacity="0.6"/>
  </g>

  <!-- ESTRELAS/PLANTAS NO CHÃO (6 pontas estilo agave/mandacaru) -->
  <!-- Estrela 1 - esquerda -->
  <g transform="translate(160,530)">
    <polygon points="0,-45 6,-15 -30,-30" fill="black"/>
    <polygon points="0,-45 -6,-15 30,-30" fill="black"/>
    <polygon points="-35,10 -8,-5 -15,25" fill="black"/>
    <polygon points="35,10 8,-5 15,25" fill="black"/>
    <polygon points="-20,38 -4,12 4,12" fill="black"/>
    <polygon points="20,38 4,12 -4,12" fill="black"/>
  </g>

  <!-- Estrela 2 - centro-esquerda -->
  <g transform="translate(480,540)">
    <polygon points="0,-50 7,-16 -33,-33" fill="black"/>
    <polygon points="0,-50 -7,-16 33,-33" fill="black"/>
    <polygon points="-38,12 -9,-5 -16,28" fill="black"/>
    <polygon points="38,12 9,-5 16,28" fill="black"/>
    <polygon points="-22,42 -5,14 5,14" fill="black"/>
    <polygon points="22,42 5,14 -5,14" fill="black"/>
  </g>

  <!-- Estrela 3 - centro-direita -->
  <g transform="translate(720,535)">
    <polygon points="0,-42 5,-14 -28,-28" fill="black"/>
    <polygon points="0,-42 -5,-14 28,-28" fill="black"/>
    <polygon points="-32,9 -7,-4 -14,24" fill="black"/>
    <polygon points="32,9 7,-4 14,24" fill="black"/>
    <polygon points="-18,36 -4,11 4,11" fill="black"/>
    <polygon points="18,36 4,11 -4,11" fill="black"/>
  </g>

  <!-- Estrela 4 - direita -->
  <g transform="translate(1050,538)">
    <polygon points="0,-44 6,-14 -30,-30" fill="black"/>
    <polygon points="0,-44 -6,-14 30,-30" fill="black"/>
    <polygon points="-34,10 -8,-5 -15,26" fill="black"/>
    <polygon points="34,10 8,-5 15,26" fill="black"/>
    <polygon points="-20,40 -4,12 4,12" fill="black"/>
    <polygon points="20,40 4,12 -4,12" fill="black"/>
  </g>
</svg>
